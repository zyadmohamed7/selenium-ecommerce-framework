name: Java CI with Maven and Allure

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Selenium Tests & Generate Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome Browser (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run TestNG Tests
        run: mvn clean test

      - name: Generate Allure Report
        if: always()
        run: |
          # Download and install Allure CLI to compile the report
          wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          tar -zxvf allure-2.24.0.tgz
          sudo mv allure-2.24.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          # Compile the report
          allure generate target/allure-results --clean -o target/allure-report

      - name: Upload Allure Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 1

      - name: Upload Allure HTML Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: target/allure-report
          retention-days: 1

      - name: Upload Local Screenshots & Test Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-screenshots
          path: test-output/
          retention-days: 1
